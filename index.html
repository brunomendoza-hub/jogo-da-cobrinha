<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Cobrinha 🐍</title>
  <style>
    body {
      background-color: #1a1a24;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    h1 {
      margin-bottom: 10px;
    }

    #score-board {
      font-size: 1.2rem;
      margin-bottom: 15px;
    }

    canvas {
      border: 4px solid #4e4e6d;
      background-color: #0f0f17;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      border-radius: 8px;
    }

    .dica {
      margin-top: 15px;
      color: #aaa;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h1>Jogo da Cobrinha 🐍</h1>
  <div id="score-board">Pontuação: <span id="score">0</span></div>
  <canvas id="snake" width="400" height="400"></canvas>
  <div class="dica">Use as **setas do teclado** para jogar.</div>

  <script>
    const canvas = document.getElementById('snake');
    const context = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    const box = 20; // Tamanho de cada bloco do grid
    let score = 0;

    // A cobrinha começa no meio
    let snake = [];
    snake[0] = { x: 10 * box, y: 10 * box };

    // Direção inicial
    let d = 'RIGHT';

    // Comida em posição aleatória
    let food = {
      x: Math.floor(Math.random() * 19 + 1) * box,
      y: Math.floor(Math.random() * 19 + 1) * box
    };

    // Escutar as teclas pressionadas
    document.addEventListener('keydown', direction);

    function direction(event) {
      if (event.keyCode == 37 && d != 'RIGHT') d = 'LEFT';
      else if (event.keyCode == 38 && d != 'DOWN') d = 'UP';
      else if (event.keyCode == 39 && d != 'LEFT') d = 'RIGHT';
      else if (event.keyCode == 40 && d != 'UP') d = 'DOWN';
    }

    // Checar colisão no próprio corpo
    function collision(head, array) {
      for (let i = 0; i < array.length; i++) {
        if (head.x == array[i].x && head.y == array[i].y) {
          return true;
        }
      }
      return false;
    }

    // Função principal do jogo
    function draw() {
      // Limpar o canvas a cada frame
      context.fillStyle = '#0f0f17';
      context.fillRect(0, 0, canvas.width, canvas.height);

      // Desenhar a cobrinha
      for (let i = 0; i < snake.length; i++) {
        context.fillStyle = (i == 0) ? '#4CAF50' : '#81C784'; // Cabeça mais escura
        context.fillRect(snake[i].x, snake[i].y, box, box);

        context.strokeStyle = '#0f0f17';
        context.strokeRect(snake[i].x, snake[i].y, box, box);
      }

      // Desenhar a comida
      context.fillStyle = '#FF5252';
      context.fillRect(food.x, food.y, box, box);

      // Posição antiga da cabeça
      let snakeX = snake[0].x;
      let snakeY = snake[0].y;

      // Mover a cabeça conforme a direção
      if (d == 'LEFT') snakeX -= box;
      if (d == 'UP') snakeY -= box;
      if (d == 'RIGHT') snakeX += box;
      if (d == 'DOWN') snakeY += box;

      // Se a cobra comer a comida
      if (snakeX == food.x && snakeY == food.y) {
        score++;
        scoreElement.innerText = score;
        food = {
          x: Math.floor(Math.random() * 19 + 1) * box,
          y: Math.floor(Math.random() * 19 + 1) * box
        };
      } else {
        // Remove a cauda se não comeu nada
        snake.pop();
      }

      // Nova cabeça
      let newHead = { x: snakeX, y: snakeY };

      // Regras de Game Over (Colisão com bordas ou próprio corpo)
      if (
        snakeX < 0 || snakeX >= canvas.width ||
        snakeY < 0 || snakeY >= canvas.height ||
        collision(newHead, snake)
      ) {
        clearInterval(game);
        alert(`Game Over! 💀\nSua pontuação final foi: ${score}`);
        location.reload(); // Reinicia o jogo
      }

      snake.unshift(newHead);
    }

    // Atualizar o jogo a cada 100ms
    let game = setInterval(draw, 100);
  </script>
</body>
</html>
