<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS 3D Ultra - Campo de Treinamento 🔫🎯</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: #87ceeb;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* HUD Futurista */
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #ffffff;
      font-size: 1.6rem;
      font-weight: 900;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
      pointer-events: none;
      font-family: monospace;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 20px;
      border-radius: 8px;
      border-left: 5px solid #ff3300;
    }

    /* Mira tática de alta precisão */
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background-color: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 4px #000;
    }

    #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
    #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

    /* Tela de Início */
    #instructions {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, rgba(15, 23, 42, 0.85) 0%, rgba(3, 7, 18, 0.95) 100%);
      color: white;
      cursor: pointer;
      text-align: center;
      z-index: 10;
    }

    #instructions h1 {
      font-size: 3.5rem;
      margin: 0 0 10px 0;
      color: #ffaa00;
      text-shadow: 0 0 20px rgba(255, 170, 0, 0.6);
    }

    #instructions p {
      font-size: 1.2rem;
      color: #cbd5e1;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

  <div id="hud">ALVOS ELIMINADOS: <span id="score">0</span></div>
  <div id="crosshair"></div>

  <div id="instructions">
    <h1>CAMPO DE TIRO 3D 🔫</h1>
    <p>Clique para iniciar a simulação</p>
    <p><small>Controles: <b>W, A, S, D</b> para mover | <b>Mouse</b> para apontar | <b>Clique Esquerdo</b> para disparar</small></p>
  </div>

  <script>
    let scene, camera, renderer, controls;
    let targets = [];
    let bullets = [];
    let score = 0;
    let gunGroup, muzzleFlashLight;

    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let prevTime = performance.now();
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();

    const instructions = document.getElementById('instructions');
    const scoreElement = document.getElementById('score');

    // --- SINTETIZADOR AVANÇADO DE ÁUDIO DE ARMA (Web Audio API) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playGunshotSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const t = audioCtx.currentTime;

      // 1. Estouro de Sub-Grave (O "punch" no peito)
      const subOsc = audioCtx.createOscillator();
      const subGain = audioCtx.createGain();
      subOsc.type = 'triangle';
      subOsc.frequency.setValueAtTime(160, t);
      subOsc.frequency.exponentialRampToValueAtTime(30, t + 0.12);
      subGain.gain.setValueAtTime(1.2, t);
      subGain.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
      subOsc.connect(subGain);
      subGain.connect(audioCtx.destination);
      subOsc.start(t);
      subOsc.stop(t + 0.12);

      // 2. Ruído do Disparo (Snap/Crack)
      const bufferSize = audioCtx.sampleRate * 0.25;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(4000, t);
      filter.frequency.exponentialRampToValueAtTime(300, t + 0.2);

      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(1.0, t);
      noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);

      noise.connect(filter);
      filter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noise.start(t);

      // 3. Som de Cápsula Caindo (Metal Brass Tint)
      setTimeout(() => {
        const brassOsc = audioCtx.createOscillator();
        const brassGain = audioCtx.createGain();
        brassOsc.type = 'sine';
        brassOsc.frequency.setValueAtTime(2500, audioCtx.currentTime);
        brassOsc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.05);
        brassGain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        brassGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        brassOsc.connect(brassGain);
        brassGain.connect(audioCtx.destination);
        brassOsc.start();
        brassOsc.stop(audioCtx.currentTime + 0.05);
      }, 120);
    }

    function playExplosionSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const t = audioCtx.currentTime;

      const bufferSize = audioCtx.sampleRate * 0.4;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(1200, t);
      filter.frequency.exponentialRampToValueAtTime(40, t + 0.4);

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.9, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);

      noise.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      noise.start(t);
    }

    function init() {
      // 1. Cena com iluminação clara de dia
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xdbeafe); // Céu claro
      scene.fog = new THREE.FogExp2(0xdbeafe, 0.008);

      // 2. Câmera
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

      // 3. Luzes do Dia
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
      scene.add(ambientLight);

      const sunLight = new THREE.DirectionalLight(0xfffbeb, 1.2);
      sunLight.position.set(40, 80, 40);
      sunLight.castShadow = true;
      scene.add(sunLight);

      // 4. Criar Arma Detalhada
      createDetailedGun();

      // 5. Controles
      controls = new THREE.PointerLockControls(camera, document.body);

      instructions.addEventListener('click', () => controls.lock());
      controls.addEventListener('lock', () => instructions.style.display = 'none');
      controls.addEventListener('unlock', () => instructions.style.display = 'flex');

      scene.add(controls.getObject());

      // Teclado
      document.addEventListener('keydown', (e) => {
        switch (e.code) {
          case 'KeyW': moveForward = true; break;
          case 'KeyA': moveLeft = true; break;
          case 'KeyS': moveBackward = true; break;
          case 'KeyD': moveRight = true; break;
        }
      });

      document.addEventListener('keyup', (e) => {
        switch (e.code) {
          case 'KeyW': moveForward = false; break;
          case 'KeyA': moveLeft = false; break;
          case 'KeyS': moveBackward = false; break;
          case 'KeyD': moveRight = false; break;
        }
      });

      // Atirar
      document.addEventListener('mousedown', (e) => {
        if (controls.isLocked && e.button === 0) shoot();
      });

      // 6. Construir o Mapa do Campo de Tiro
      buildEnvironment();

      // 7. Spawno dos Alvos
      for (let i = 0; i < 8; i++) spawnTacticalTarget();

      // Renderizador
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      window.addEventListener('resize', onWindowResize);
    }

    // Mapa com chão espelhado e obstáculos
    function buildEnvironment() {
      // Piso principal
      const floorMat = new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.4, metalness: 0.5 });
      const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), floorMat);
      floor.rotation.x = -Math.PI / 2;
      scene.add(floor);

      const grid = new THREE.GridHelper(200, 40, 0xffaa00, 0x475569);
      grid.position.y = 0.01;
      scene.add(grid);

      // Pilares de concreto para dar tridimensionalidade ao ambiente
      const pillarMat = new THREE.MeshStandardMaterial({ color: 0x64748b, roughness: 0.7 });
      for (let i = 0; i < 16; i++) {
        const pillar = new THREE.Mesh(new THREE.BoxGeometry(3, 12, 3), pillarMat);
        pillar.position.set((Math.random() - 0.5) * 120, 6, (Math.random() - 0.5) * 120);
        scene.add(pillar);
      }
    }

    // Rifle Tático Detalhado
    function createDetailedGun() {
      gunGroup = new THREE.Group();

      const darkMetal = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.3, metalness: 0.8 });
      const blackPlastic = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.6 });
      const goldMat = new THREE.MeshStandardMaterial({ color: 0xd97706, metalness: 0.9, roughness: 0.2 });

      // Corpo principal
      const receiver = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.5), darkMetal);
      
      // Pente de Munição Curvo
      const mag = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.22, 0.1), blackPlastic);
      mag.position.set(0, -0.12, -0.05);
      mag.rotation.x = 0.2;

      // Cano e Silenciador
      const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.5, 16), darkMetal);
      barrel.rotation.x = Math.PI / 2;
      barrel.position.set(0, 0.02, -0.4);

      const suppressor = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.25, 16), blackPlastic);
      suppressor.rotation.x = Math.PI / 2;
      suppressor.position.set(0, 0.02, -0.7);

      // Mira Telescópica (Scope)
      const scopeBody = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.25, 16), blackPlastic);
      scopeBody.rotation.x = Math.PI / 2;
      scopeBody.position.set(0, 0.09, -0.1);

      const scopeLens = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.01, 16), goldMat);
      scopeLens.rotation.x = Math.PI / 2;
      scopeLens.position.set(0, 0.09, -0.23);

      // Empunhadura
      const grip = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.18, 0.08), blackPlastic);
      grip.position.set(0, -0.12, 0.12);
      grip.rotation.x = -0.3;

      // Luz do Fogo na Ponta da Arma
      muzzleFlashLight = new THREE.PointLight(0xffaa00, 0, 5);
      muzzleFlashLight.position.set(0, 0.02, -0.85);

      gunGroup.add(receiver, mag, barrel, suppressor, scopeBody, scopeLens, grip, muzzleFlashLight);

      // Posicionar arma na mão direita
      gunGroup.position.set(0.22, -0.18, -0.4);
      camera.add(gunGroup);
    }

    // Alvo Tático Profissional (Disco com Círculos Concentricos)
    function spawnTacticalTarget() {
      const targetGroup = new THREE.Group();

      // Placa Vermelha/Branca
      const baseGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.1, 32);
      const redMat = new THREE.MeshStandardMaterial({ color: 0xdc2626, roughness: 0.4 });
      const whiteMat = new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.4 });

      const outerRing = new THREE.Mesh(baseGeo, redMat);
      outerRing.rotation.x = Math.PI / 2;

      const innerRing = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 0.12, 32), whiteMat);
      innerRing.rotation.x = Math.PI / 2;

      const bullseye = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.14, 32), redMat);
      bullseye.rotation.x = Math.PI / 2;

      targetGroup.add(outerRing, innerRing, bullseye);

      targetGroup.position.x = (Math.random() - 0.5) * 80;
      targetGroup.position.z = (Math.random() - 0.5) * 80;
      targetGroup.position.y = 1.5 + Math.random() * 4;

      targetGroup.userData = {
        speedY: (Math.random() - 0.5) * 0.02,
        speedX: (Math.random() - 0.5) * 0.04
      };

      scene.add(targetGroup);
      targets.push(targetGroup);
    }

    // Disparo
    function shoot() {
      playGunshotSound();

      // Clarão real da iluminação na arma
      muzzleFlashLight.intensity = 3;
      setTimeout(() => muzzleFlashLight.intensity = 0, 40);

      // Coice forte da arma
      gunGroup.position.z = -0.28;
      gunGroup.rotation.x = 0.2;

      // Projétil Tático Amarelo
      const bulletGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.6, 8);
      const bulletMat = new THREE.MeshBasicMaterial({ color: 0xfacc15 });
      const bullet = new THREE.Mesh(bulletGeo, bulletMat);

      bullet.position.copy(camera.position);

      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);
      
      bullet.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
      bullet.velocity = dir.multiplyScalar(3.0);

      scene.add(bullet);
      bullets.push(bullet);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Loop do Jogo
    function animate() {
      requestAnimationFrame(animate);

      const time = performance.now();

      if (controls.isLocked) {
        const delta = (time - prevTime) / 1000;

        // Suavização do coice da arma
        gunGroup.position.z += (-0.4 - gunGroup.position.z) * 0.12;
        gunGroup.rotation.x += (0 - gunGroup.rotation.x) * 0.12;

        // Movimentação
        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;

        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();

        if (moveForward || moveBackward) velocity.z -= direction.z * 120.0 * delta;
        if (moveLeft || moveRight) velocity.x -= direction.x * 120.0 * delta;

        controls.moveRight(-velocity.x * delta);
        controls.moveForward(-velocity.z * delta);

        // Movimentação dos Alvos
        targets.forEach(t => {
          t.position.y += Math.sin(time * 0.002) * 0.01;
          t.rotation.y += 0.01;
        });

        // Balas e Colisão
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          b.position.add(b.velocity);

          for (let j = targets.length - 1; j >= 0; j--) {
            const t = targets[j];
            if (b.position.distanceTo(t.position) < 1.4) {
              playExplosionSound();

              scene.remove(t);
              targets.splice(j, 1);

              scene.remove(b);
              bullets.splice(i, 1);

              score++;
              scoreElement.innerText = score;

              spawnTacticalTarget();
              break;
            }
          }

          if (b && b.position.distanceTo(camera.position) > 120) {
            scene.remove(b);
            bullets.splice(i, 1);
          }
        }
      }

      prevTime = time;
      renderer.render(scene, camera);
    }

    init();
    animate();
  </script>
</body>
</html>
