<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS 3D Realista 🔫🎯</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* HUD */
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #00ffcc;
      font-size: 1.5rem;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0, 255, 204, 0.7);
      pointer-events: none;
      font-family: monospace;
    }

    /* Mira tática */
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 14px;
      height: 14px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background-color: rgba(0, 255, 204, 0.8);
    }

    /* Linhas verticais e horizontais da mira */
    #crosshair::before { top: 6px; left: 0; width: 14px; height: 2px; }
    #crosshair::after { top: 0; left: 6px; width: 2px; height: 14px; }

    /* Tela de Início */
    #instructions {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, rgba(15,23,42,0.9) 0%, rgba(3,7,18,0.98) 100%);
      color: white;
      cursor: pointer;
      text-align: center;
    }

    #instructions h1 {
      font-size: 3.5rem;
      margin: 0 0 10px 0;
      color: #00ffcc;
      text-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
    }

    #instructions p {
      font-size: 1.2rem;
      color: #94a3b8;
    }

    /* Clarion de luz do tiro (Muzzle Flash) */
    #flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(255, 200, 100, 0.15);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.05s ease-out;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

  <div id="hud">DRONES DESTRUÍDOS: <span id="score">0</span></div>
  <div id="crosshair"></div>
  <div id="flash"></div>

  <div id="instructions">
    <h1>CYBER HUNT 3D 🔫</h1>
    <p>Clique em qualquer lugar para carregar a arma e jogar</p>
    <p><small>Controles: <b>W, A, S, D</b> para andar | <b>Mouse</b> para apontar | <b>Clique Esquerdo</b> para atirar</small></p>
  </div>

  <script>
    let scene, camera, renderer, controls;
    let targets = [];
    let bullets = [];
    let score = 0;
    let gunGroup;

    // Estado do jogo e físicas
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let prevTime = performance.now();
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();

    const instructions = document.getElementById('instructions');
    const scoreElement = document.getElementById('score');
    const flashElement = document.getElementById('flash');

    // --- SINTETIZADOR DE ÁUDIO PROCEDURAL (Web Audio API) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playGunshotSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();

      // Ruído do estouro do tiro
      const bufferSize = audioCtx.sampleRate * 0.15;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      // Filtro para dar graves de arma de verdade
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(3000, audioCtx.currentTime);
      filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

      noise.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      noise.start();
    }

    function playExplosionSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const bufferSize = audioCtx.sampleRate * 0.3;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(800, audioCtx.currentTime);
      filter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);

      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

      noise.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      noise.start();
    }

    function init() {
      // 1. Cena
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a12);
      scene.fog = new THREE.FogExp2(0x0a0a12, 0.015);

      // 2. Câmera
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

      // 3. Iluminação
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0x00ffcc, 0.8);
      dirLight.position.set(20, 40, 20);
      scene.add(dirLight);

      // 4. Construção da Arma 3D (Anexada à Câmera)
      createGun();

      // 5. Controles
      controls = new THREE.PointerLockControls(camera, document.body);

      instructions.addEventListener('click', () => {
        controls.lock();
      });

      controls.addEventListener('lock', () => {
        instructions.style.display = 'none';
      });

      controls.addEventListener('unlock', () => {
        instructions.style.display = 'flex';
      });

      scene.add(controls.getObject());

      // Movimentação do Teclado
      document.addEventListener('keydown', (e) => {
        switch (e.code) {
          case 'KeyW': moveForward = true; break;
          case 'KeyA': moveLeft = true; break;
          case 'KeyS': moveBackward = true; break;
          case 'KeyD': moveRight = true; break;
        }
      });

      document.addEventListener('keyup', (e) => {
        switch (e.code) {
          case 'KeyW': moveForward = false; break;
          case 'KeyA': moveLeft = false; break;
          case 'KeyS': moveBackward = false; break;
          case 'KeyD': moveRight = false; break;
        }
      });

      // Atirar
      document.addEventListener('mousedown', (e) => {
        if (controls.isLocked && e.button === 0) {
          shoot();
        }
      });

      // 6. Cenário (Piso e Paredes Sci-Fi)
      const grid = new THREE.GridHelper(200, 80, 0x00ffcc, 0x1e293b);
      grid.position.y = 0;
      scene.add(grid);

      // 7. Spawno dos Novos Alvos (Drones)
      for (let i = 0; i < 10; i++) {
        spawnDrone();
      }

      // Renderizador
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      window.addEventListener('resize', onWindowResize);
    }

    // Criar o Modelo 3D do Rifle
    function createGun() {
      gunGroup = new THREE.Group();

      const darkMat = new THREE.MeshStandardMaterial({ color: 0x111116, roughness: 0.2, metalness: 0.8 });
      const metalMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.1, metalness: 0.9 });
      const cyanMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc });

      // Corpo principal
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.15, 0.6), darkMat);
      body.position.set(0, 0, 0);

      // Cano da arma
      const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.5, 16), metalMat);
      barrel.rotation.x = Math.PI / 2;
      barrel.position.set(0, 0.03, -0.4);

      // Empunhadura
      const grip = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.2, 0.1), darkMat);
      grip.position.set(0, -0.12, 0.15);
      grip.rotation.x = -0.2;

      // Mira Neon Cyan
      const sight = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.04, 0.02), cyanMat);
      sight.position.set(0, 0.09, -0.2);

      gunGroup.add(body, barrel, grip, sight);

      // Posiciona a arma no canto inferior direito da tela
      gunGroup.position.set(0.25, -0.2, -0.45);
      camera.add(gunGroup);
    }

    // Criar Alvos (Drones Voadores)
    function spawnDrone() {
      const droneGroup = new THREE.Group();

      // Núcleo do drone
      const coreMat = new THREE.MeshStandardMaterial({ color: 0xff0055, roughness: 0.3 });
      const core = new THREE.Mesh(new THREE.OctahedronGeometry(1.0), coreMat);

      // Anel futurista
      const ringMat = new THREE.MeshBasicMaterial({ color: 0xff0055, wireframe: true });
      const ring = new THREE.Mesh(new THREE.TorusGeometry(1.4, 0.08, 8, 24), ringMat);
      ring.rotation.x = Math.PI / 2;

      droneGroup.add(core, ring);

      // Posição inicial flutuante
      droneGroup.position.x = (Math.random() - 0.5) * 80;
      droneGroup.position.z = (Math.random() - 0.5) * 80;
      droneGroup.position.y = 2 + Math.random() * 6;

      // Dados para animação de movimento aleatório
      droneGroup.userData = {
        speedX: (Math.random() - 0.5) * 0.08,
        speedY: (Math.random() - 0.5) * 0.03,
        speedZ: (Math.random() - 0.5) * 0.08,
        ring: ring
      };

      scene.add(droneGroup);
      targets.push(droneGroup);
    }

    // Ação do Tiro
    function shoot() {
      playGunshotSound();

      // Muzzle Flash na tela
      flashElement.style.opacity = '1';
      setTimeout(() => flashElement.style.opacity = '0', 40);

      // Efeito de Recuo (Coice) da arma
      gunGroup.position.z = -0.35;
      gunGroup.rotation.x = 0.15;

      // Criar o Projétil
      const bulletGeo = new THREE.SphereGeometry(0.08, 8, 8);
      const bulletMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
      const bullet = new THREE.Mesh(bulletGeo, bulletMat);

      bullet.position.copy(camera.position);

      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);
      bullet.velocity = dir.multiplyScalar(2.5);

      scene.add(bullet);
      bullets.push(bullet);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Loop Principal
    function animate() {
      requestAnimationFrame(animate);

      const time = performance.now();

      if (controls.isLocked) {
        const delta = (time - prevTime) / 1000;

        // Recuperação suave do recuo da arma
        gunGroup.position.z += (-0.45 - gunGroup.position.z) * 0.15;
        gunGroup.rotation.x += (0 - gunGroup.rotation.x) * 0.15;

        // Física do Jogador
        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;

        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();

        if (moveForward || moveBackward) velocity.z -= direction.z * 120.0 * delta;
        if (moveLeft || moveRight) velocity.x -= direction.x * 120.0 * delta;

        controls.moveRight(-velocity.x * delta);
        controls.moveForward(-velocity.z * delta);

        // Movimentação e Animação dos Drones
        targets.forEach(drone => {
          drone.position.x += drone.userData.speedX;
          drone.position.y += Math.sin(time * 0.003) * 0.02; // Flutuando
          drone.position.z += drone.userData.speedZ;

          drone.userData.ring.rotation.z += 0.03; // Anel girando

          // Rebater nas bordas do mapa
          if (Math.abs(drone.position.x) > 50) drone.userData.speedX *= -1;
          if (Math.abs(drone.position.z) > 50) drone.userData.speedZ *= -1;
        });

        // Atualização e Colisão das Balas
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          b.position.add(b.velocity);

          for (let j = targets.length - 1; j >= 0; j--) {
            const drone = targets[j];
            if (b.position.distanceTo(drone.position) < 1.6) {
              
              playExplosionSound();

              scene.remove(drone);
              targets.splice(j, 1);

              scene.remove(b);
              bullets.splice(i, 1);

              score++;
              scoreElement.innerText = score;

              spawnDrone();
              break;
            }
          }

          if (b && b.position.distanceTo(camera.position) > 120) {
            scene.remove(b);
            bullets.splice(i, 1);
          }
        }
      }

      prevTime = time;
      renderer.render(scene, camera);
    }

    init();
    animate();
  </script>
</body>
</html>
