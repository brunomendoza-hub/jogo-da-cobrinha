<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Candy Match 🍬</title>
  <style>
    * {
      box-sizing: border-box;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      background-color: #2b1055;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 10px;
    }

    h1 {
      margin: 0 0 5px 0;
      font-size: 1.8rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    #score-board {
      font-size: 1.3rem;
      margin-bottom: 15px;
      background-color: rgba(255, 255, 255, 0.1);
      padding: 8px 20px;
      border-radius: 20px;
    }

    /* Tabuleiro */
    #grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      gap: 4px;
      width: 100%;
      max-width: 400px;
      aspect-ratio: 1 / 1;
      background-color: rgba(0, 0, 0, 0.3);
      padding: 8px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    /* Cada Bloco do Doce */
    .candy {
      background-color: rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      cursor: pointer;
      transition: transform 0.1s, background-color 0.2s;
    }

    .candy:active {
      transform: scale(0.9);
    }

    /* Destaque quando selecionado */
    .selected {
      background-color: rgba(255, 215, 0, 0.6);
      border: 2px solid #ffd700;
    }
  </style>
</head>
<body>

  <h1>Candy Match 🍬</h1>
  <div id="score-board">Pontuação: <span id="score">0</span></div>

  <div id="grid"></div>

  <script>
    const width = 8;
    const grid = document.getElementById('grid');
    const scoreDisplay = document.getElementById('score');
    const candies = ['🍬', '🍭', '🍫', '🍩', '🍇'];
    let squares = [];
    let score = 0;

    let squareBeingDragged;
    let squareBeingReplaced;

    // Criar o tabuleiro
    function createBoard() {
      for (let i = 0; i < width * width; i++) {
        const square = document.createElement('div');
        square.setAttribute('id', i);
        square.classList.add('candy');
        
        let randomCandy = candies[Math.floor(Math.random() * candies.length)];
        square.innerText = randomCandy;

        // Clique/Toque para selecionar
        square.addEventListener('click', candyClick);

        grid.appendChild(square);
        squares.push(square);
      }
      // Limpar combinações geradas no início aleatório
      checkMatches();
    }

    createBoard();

    // Lógica de Seleção
    let firstSelected = null;

    function candyClick() {
      if (!firstSelected) {
        firstSelected = this;
        firstSelected.classList.add('selected');
      } else {
        let secondSelected = this;
        firstSelected.classList.remove('selected');

        let firstId = parseInt(firstSelected.id);
        let secondId = parseInt(secondSelected.id);

        // Movimentos válidos: Apenas vizinhos (cima, baixo, esquerda, direita)
        const validMoves = [
          firstId - 1,
          firstId + 1,
          firstId - width,
          firstId + width
        ];

        let isValidMove = validMoves.includes(secondId);

        // Impede troca nas bordas da esquerda/direita
        if (firstId % width === 0 && secondId === firstId - 1) isValidMove = false;
        if ((firstId + 1) % width === 0 && secondId === firstId + 1) isValidMove = false;

        if (isValidMove) {
          // Troca os doces
          let tempCandy = firstSelected.innerText;
          firstSelected.innerText = secondSelected.innerText;
          secondSelected.innerText = tempCandy;

          // Se a troca não gerar ponto, desfazer
          let hasMatch = checkMatches();
          if (!hasMatch) {
            setTimeout(() => {
              secondSelected.innerText = firstSelected.innerText;
              firstSelected.innerText = tempCandy;
            }, 250);
          }
        }
        firstSelected = null;
      }
    }

    // Verificar combinações de 3
    function checkMatches() {
      let matched = false;

      // Linhas de 3
      for (let i = 0; i < 64; i++) {
        let rowOfThree = [i, i + 1, i + 2];
        let decidedCandy = squares[i].innerText;
        const isBlank = squares[i].innerText === '';

        // Pular verificações que dobram a borda da direita
        if (i % width > width - 3) continue;

        if (rowOfThree.every(index => squares[index].innerText === decidedCandy && !isBlank)) {
          score += 30;
          scoreDisplay.innerText = score;
          rowOfThree.forEach(index => squares[index].innerText = '');
          matched = true;
        }
      }

      // Colunas de 3
      for (let i = 0; i < 48; i++) {
        let columnOfThree = [i, i + width, i + width * 2];
        let decidedCandy = squares[i].innerText;
        const isBlank = squares[i].innerText === '';

        if (columnOfThree.every(index => squares[index].innerText === decidedCandy && !isBlank)) {
          score += 30;
          scoreDisplay.innerText = score;
          columnOfThree.forEach(index => squares[index].innerText = '');
          matched = true;
        }
      }

      return matched;
    }

    // Fazer os doces caírem e preencher espaços vazios
    function moveDown() {
      for (let i = 0; i < 56; i++) {
        if (squares[i + width].innerText === '') {
          squares[i + width].innerText = squares[i].innerText;
          squares[i].innerText = '';
        }

        // Gerar novos doces no topo
        const firstRow = [0, 1, 2, 3, 4, 5, 6, 7];
        const isFirstRow = firstRow.includes(i);
        if (isFirstRow && squares[i].innerText === '') {
          let randomCandy = candies[Math.floor(Math.random() * candies.length)];
          squares[i].innerText = randomCandy;
        }
      }
    }

    // Loop do jogo para checar combinações e física de queda em tempo real
    window.setInterval(function () {
      moveDown();
      checkMatches();
    }, 100);
  </script>
</body>
</html>
