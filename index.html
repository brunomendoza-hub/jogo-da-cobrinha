<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS Simples 3D 🎯</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }

    /* HUD - Interface na tela */
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #fff;
      font-size: 1.5rem;
      font-weight: bold;
      text-shadow: 2px 2px 4px #000;
      pointer-events: none;
    }

    /* Mira central */
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      background-color: rgba(255, 255, 255, 0.8);
      border: 2px solid #000;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Tela de Início / Instruções */
    #instructions {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: rgba(0,0,0,0.85);
      color: white;
      cursor: pointer;
      text-align: center;
    }

    #instructions h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    #instructions p {
      font-size: 1.2rem;
      color: #ccc;
    }
  </style>

  <!-- Biblioteca Three.js e PointerLockControls via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

  <div id="hud">Pontos: <span id="score">0</span></div>
  <div id="crosshair"></div>

  <div id="instructions">
    <h1>FPS 3D 🎯</h1>
    <p>Clique na tela para Jogar</p>
    <p><small>Controles: <b>W, A, S, D</b> para andar | <b>Mouse</b> para olhar | <b>Clique Esquerdo</b> para Atirar</small></p>
  </div>

  <script>
    let scene, camera, renderer, controls;
    let targets = [];
    let bullets = [];
    let score = 0;

    // Teclas pressionadas
    let moveForward = false;
    let moveBackward = false;
    let moveLeft = false;
    let moveRight = false;
    let prevTime = performance.now();
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();

    const instructions = document.getElementById('instructions');
    const scoreElement = document.getElementById('score');

    function init() {
      // 1. Cenário (Cena)
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x11111d);
      scene.fog = new THREE.Fog(0x11111d, 0, 75);

      // 2. Câmera
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.y = 1.6; // Altura dos olhos do jogador

      // 3. Luzes
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      const light = new THREE.DirectionalLight(0xffffff, 0.8);
      light.position.set(10, 20, 15);
      scene.add(light);

      // 4. Controles da Câmera (PointerLock)
      controls = new THREE.PointerLockControls(camera, document.body);

      instructions.addEventListener('click', () => {
        controls.lock();
      });

      controls.addEventListener('lock', () => {
        instructions.style.display = 'none';
      });

      controls.addEventListener('unlock', () => {
        instructions.style.display = 'flex';
      });

      scene.add(controls.getObject());

      // Controles do Teclado
      const onKeyDown = (event) => {
        switch (event.code) {
          case 'KeyW': moveForward = true; break;
          case 'KeyA': moveLeft = true; break;
          case 'KeyS': moveBackward = true; break;
          case 'KeyD': moveRight = true; break;
        }
      };

      const onKeyUp = (event) => {
        switch (event.code) {
          case 'KeyW': moveForward = false; break;
          case 'KeyA': moveLeft = false; break;
          case 'KeyS': moveBackward = false; break;
          case 'KeyD': moveRight = false; break;
        }
      };

      document.addEventListener('keydown', onKeyDown);
      document.addEventListener('keyup', onKeyUp);

      // Evento de Tiro
      document.addEventListener('mousedown', (e) => {
        if (controls.isLocked && e.button === 0) {
          shoot();
        }
      });

      // 5. Chão (Grade)
      const floorGrid = new THREE.GridHelper(100, 50, 0x444466, 0x222233);
      scene.add(floorGrid);

      // 6. Criar Alvos Iniciais
      for (let i = 0; i < 8; i++) {
        spawnTarget();
      }

      // 7. Renderizador
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      window.addEventListener('resize', onWindowResize);
    }

    // Criar Inimigos/Alvos Vermelhos
    function spawnTarget() {
      const geometry = new THREE.SphereGeometry(1.2, 16, 16);
      const material = new THREE.MeshStandardMaterial({ color: 0xff3333, roughness: 0.3 });
      const target = new THREE.Mesh(geometry, material);

      // Posições aleatórias
      target.position.x = (Math.random() - 0.5) * 60;
      target.position.z = (Math.random() - 0.5) * 60;
      target.position.y = 1.2 + Math.random() * 2;

      scene.add(target);
      targets.push(target);
    }

    // Lógica do Tiro
    function shoot() {
      const bulletGeo = new THREE.SphereGeometry(0.15, 8, 8);
      const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
      const bullet = new THREE.Mesh(bulletGeo, bulletMat);

      // Posição inicial da bala (na câmera)
      bullet.position.copy(camera.position);

      // Direção para onde a câmera aponta
      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);
      bullet.velocity = dir.multiplyScalar(2.0); // Velocidade do projétil

      scene.add(bullet);
      bullets.push(bullet);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // Loop do Jogo
    function animate() {
      requestAnimationFrame(animate);

      const time = performance.now();

      if (controls.isLocked) {
        const delta = (time - prevTime) / 1000;

        // Frito de Fricção/Desaceleração
        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;

        direction.z = Number(moveForward) - Number(moveBackward);
        direction.x = Number(moveRight) - Number(moveLeft);
        direction.normalize();

        if (moveForward || moveBackward) velocity.z -= direction.z * 100.0 * delta;
        if (moveLeft || moveRight) velocity.x -= direction.x * 100.0 * delta;

        controls.moveRight(-velocity.x * delta);
        controls.moveForward(-velocity.z * delta);

        // Atualizar Balas
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          b.position.add(b.velocity);

          // Checar colisão da bala com os alvos
          for (let j = targets.length - 1; j >= 0; j--) {
            const t = targets[j];
            if (b.position.distanceTo(t.position) < 1.3) {
              // Acertou!
              scene.remove(t);
              targets.splice(j, 1);

              scene.remove(b);
              bullets.splice(i, 1);

              score += 10;
              scoreElement.innerText = score;

              // Spawna outro alvo em novo lugar
              spawnTarget();
              break;
            }
          }

          // Remover balas muito distantes para não pesarem
          if (b && b.position.distanceTo(camera.position) > 100) {
            scene.remove(b);
            bullets.splice(i, 1);
          }
        }
      }

      prevTime = time;
      renderer.render(scene, camera);
    }

    init();
    animate();
  </script>
</body>
</html>
